# Paths - keep all file locations here so scripts never hardcode strings
data:
  raw_path: "data/raw/Telco-Customer-Churn.csv"
  processed_dir: "data/processed"
  target_column: "Churn"

# Reproducibility - using a fixed seed means anyone re-running this
# (including you, 3 weeks from now) gets the same train/test split
split:
  test_size: 0.2
  random_state: 42

# Where artifacts get saved (we'll use this from Phase 5 onward)
artifacts:
  model_dir: "models/"
  preprocessor_path: "artifacts/preprocessor.joblib"

# Feature classification for encoding (Phase 2)
# These lists drive the encoding functions in data_preprocessing.py -
# the functions themselves don't hardcode any column names.
features:
  binary_cols:
    - "gender"
    - "Partner"
    - "Dependents"
    - "PhoneService"
    - "PaperlessBilling"

  nominal_cols:
    - "MultipleLines"
    - "InternetService"
    - "OnlineSecurity"
    - "OnlineBackup"
    - "DeviceProtection"
    - "TechSupport"
    - "StreamingTV"
    - "StreamingMovies"
    - "PaymentMethod"

  ordinal_mappings:
    Contract:
      "Month-to-month": 0
      "One year": 1
      "Two year": 2